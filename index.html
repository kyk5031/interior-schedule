<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 스케줄러</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#fff; --border:#e7e9f0; --text:#1c1e26; --sub:#8a8fa3;
    --accent:#4c6ef5; --accent-soft:#eef1ff; --danger:#f0506e; --danger-soft:#fdeef1;
    --radius:14px; --shadow:0 1px 2px rgba(20,20,43,.04), 0 8px 24px -12px rgba(20,20,43,.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;flex-wrap:wrap;gap:10px;}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px;}
  .nav{display:flex;align-items:center;gap:6px;background:var(--bg);padding:4px;border-radius:10px;}
  .nav button{border:none;background:transparent;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:14px;color:var(--text);transition:.15s;}
  .nav button:hover{background:#fff;box-shadow:var(--shadow);}
  #monthLabel{font-weight:800;font-size:14px;min-width:84px;text-align:center;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{border:none;border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px -4px rgba(76,110,245,.6);}
  .btn-primary:hover{background:#3d5fe0;}
  .btn-secondary{background:#fff;color:var(--accent);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--accent-soft);}
  .btn-plain{background:var(--bg);color:var(--text);}
  .btn-plain:hover{background:#ececf3;}
  .btn-danger{background:var(--danger-soft);color:var(--danger);}
  .btn-danger:hover{background:#fbd9e0;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}

  .calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:var(--border);margin:18px 12px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .dow{background:#fafbfd;text-align:center;padding:10px 0;font-size:12px;color:var(--sub);font-weight:700;min-width:0;}
  .dow.sun{color:var(--danger);} .dow.sat{color:var(--accent);}
  .day{background:var(--card);min-height:128px;min-width:0;padding:8px 6px;display:flex;flex-direction:column;gap:4px;cursor:pointer;position:relative;transition:.12s;overflow:hidden;}
  .day.other{background:#fbfbfd;opacity:.5;}
  .day:hover{background:#f8f9ff;}
  .daynum{font-size:12px;color:var(--sub);font-weight:700;align-self:flex-start;padding:2px 4px;}
  .daynum.today{background:var(--accent);color:#fff;border-radius:7px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0;}
  .site-card{font-size:11px;border-radius:7px;padding:4px 7px;color:#fff;line-height:1.4;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:.12s;min-width:0;width:100%;}
  .site-card .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .site-card:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .site-card .tags{opacity:.85;font-weight:500;}
  .more{font-size:10px;color:var(--sub);padding-left:4px;font-weight:600;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(20,20,40,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;backdrop-filter:blur(2px);}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:18px;width:440px;max-width:100%;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px -10px rgba(20,20,40,.35);}
  .modal h2{margin:0 0 16px;font-size:17px;font-weight:800;letter-spacing:-.2px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:600;}
  .field input,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:inherit;transition:.12s;background:#fafbfd;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  .field textarea{resize:vertical;min-height:54px;}
  .hint{font-size:11px;color:var(--sub);margin-top:4px;}
  .row{display:flex;gap:10px;}
  .row .field{flex:1;}
  .tag-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .tag-presets span{background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;transition:.12s;}
  .tag-presets span:hover{border-color:var(--accent);color:var(--accent);}
  .tag-presets span.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chosen-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:20px;}
  .chosen-tags span{background:var(--accent);color:#fff;border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;}
  .color-row{display:flex;gap:9px;margin-bottom:6px;}
  .color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:.12s;}
  .color-dot.active{border-color:#222;transform:scale(1.12);}
  .addr-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;display:inline-block;margin-top:6px;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:18px;}
  .modal-actions .right{display:flex;gap:8px;}

  .day-list-modal .site-row{display:flex;align-items:center;gap:10px;padding:10px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .day-list-modal .site-row:hover{border-color:var(--accent);background:var(--accent-soft);}
  .day-list-modal .site-row .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .day-list-modal .site-row .info{flex:1;min-width:0;}
  .day-list-modal .site-row .info .nm{font-weight:700;font-size:13.5px;}
  .day-list-modal .site-row .info .ad{font-size:11.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .day-list-modal .site-row .info .tg{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;}
  .addnew{display:flex;align-items:center;justify-content:center;gap:4px;padding:11px;border:1.5px dashed var(--border);border-radius:12px;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600;transition:.12s;}
  .addnew:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

  /* Detail view */
  .detail-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .detail-head .dot{width:13px;height:13px;border-radius:50%;flex:none;box-shadow:0 0 0 4px var(--bg);}
  .detail-head h2{margin:0;font-size:18px;}
  .detail-row{margin-bottom:16px;}
  .detail-row .label{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .detail-row .value{font-size:14px;line-height:1.55;white-space:pre-wrap;}
  .detail-row .value.empty{color:#c7cad4;}
  .detail-tags span{display:inline-block;background:var(--accent-soft);color:var(--accent);border-radius:16px;padding:5px 12px;font-size:12px;margin:0 6px 6px 0;font-weight:700;}
  .phone-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .phone-actions .num{font-size:13.5px;font-weight:700;}
  .phone-actions a{font-size:12px;text-decoration:none;border:1.5px solid var(--border);border-radius:16px;padding:5px 11px;color:var(--text);font-weight:600;transition:.12s;}
  .phone-actions a.call{color:#fff;background:var(--accent);border-color:var(--accent);}
  .phone-actions a.call:hover{background:#3d5fe0;}
  .phone-actions a.sms{color:var(--accent);}
  .phone-actions a.sms:hover{background:var(--accent-soft);}
  .vendor-block{border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .vendor-block .vname{font-weight:700;font-size:13.5px;margin-bottom:6px;}

  /* Vendor picker in form */
  .vendor-chip-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
  .vendor-chip{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:10px;padding:8px 10px;font-size:13px;}
  .vendor-chip .vinfo{display:flex;flex-direction:column;}
  .vendor-chip .vinfo b{font-size:13px;}
  .vendor-chip .vinfo span{font-size:11.5px;color:var(--sub);}
  .vendor-chip button{border:none;background:none;color:var(--danger);cursor:pointer;font-size:12px;font-weight:700;}
  .vendor-add-box{border:1.5px dashed var(--border);border-radius:12px;padding:10px;}
  .vendor-add-box.open{border-style:solid;background:#fafbfd;}
  .vendor-search-results{max-height:140px;overflow-y:auto;margin-top:6px;}
  .vendor-search-results .opt{padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;}
  .vendor-search-results .opt:hover{background:var(--accent-soft);}
  .vendor-search-results .opt b{font-weight:700;}
  .vendor-search-results .opt span{color:var(--sub);margin-left:6px;}
  .inline-row{display:flex;gap:6px;margin-top:8px;}
  .inline-row input{flex:1;}

  .empty-state{text-align:center;color:var(--sub);font-size:13px;padding:20px 0;}

  footer.app-footer{text-align:center;color:var(--sub);font-size:11.5px;padding:24px 0 32px;}
</style>
</head>
<body>

<header>
  <h1>🏗 현장 스케줄러</h1>
  <div class="nav">
    <button id="prevBtn">‹</button>
    <div id="monthLabel"></div>
    <button id="nextBtn">›</button>
    <button id="todayBtn">오늘</button>
  </div>
  <div class="toolbar">
    <button class="btn btn-secondary" id="addrBookBtn">📍 이번주 동선</button>
    <button class="btn btn-secondary" id="exportBtn">⬇ 내보내기</button>
    <button class="btn btn-secondary" id="importBtn">⬆ 가져오기</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="btn btn-primary" id="newSiteBtn">+ 새 현장</button>
  </div>
</header>

<div class="calendar" id="calendar"></div>

<footer class="app-footer">데이터는 이 기기의 브라우저에만 저장됩니다 · 다른 기기로 옮기려면 "내보내기/가져오기"를 사용하세요</footer>

<!-- Day list modal -->
<div class="overlay" id="dayListOverlay">
  <div class="modal day-list-modal">
    <h2 id="dayListTitle"></h2>
    <div id="dayListBody"></div>
    <div class="addnew" id="addnewBtn">+ 이 날짜에 현장 추가</div>
    <div class="modal-actions">
      <div></div>
      <div class="right"><button class="btn btn-plain" onclick="closeModal('dayListOverlay')">닫기</button></div>
    </div>
  </div>
</div>

<!-- Site detail (read-only) modal -->
<div class="overlay" id="siteDetailOverlay">
  <div class="modal">
    <div class="detail-head">
      <div class="dot" id="d_dot"></div>
      <h2 id="d_name"></h2>
    </div>
    <div class="detail-row">
      <div class="label">주소</div>
      <div class="value" id="d_addr"></div>
      <a href="#" target="_blank" class="addr-link" id="d_addrLink">🗺 지도에서 보기</a>
    </div>
    <div class="detail-row">
      <div class="label">기간</div>
      <div class="value" id="d_period"></div>
    </div>
    <div class="detail-row">
      <div class="label">시공 항목</div>
      <div class="detail-tags" id="d_tags"></div>
    </div>
    <div class="detail-row">
      <div class="label">고객연락처</div>
      <div id="d_customer"></div>
    </div>
    <div class="detail-row">
      <div class="label">협력업체</div>
      <div id="d_vendors"></div>
    </div>
    <div class="detail-row">
      <div class="label">메모</div>
      <div class="value" id="d_memo"></div>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger" id="d_deleteBtn">삭제</button></div>
      <div class="right">
        <button class="btn btn-plain" onclick="closeModal('siteDetailOverlay')">닫기</button>
        <button class="btn btn-primary" id="d_editBtn">수정</button>
      </div>
    </div>
  </div>
</div>

<!-- Site edit modal -->
<div class="overlay" id="siteOverlay">
  <div class="modal">
    <h2 id="siteModalTitle">현장 등록</h2>
    <div class="field">
      <label>현장명 / 고객명</label>
      <input type="text" id="f_name" placeholder="예) 김포 한빛마을 105동 1103호">
    </div>
    <div class="field">
      <label>주소</label>
      <input type="text" id="f_addr" placeholder="예) 경기 김포시 ...">
      <a href="#" target="_blank" class="addr-link" id="f_addrLink">🗺 지도에서 보기</a>
    </div>
    <div class="row">
      <div class="field">
        <label>시작일</label>
        <input type="date" id="f_start">
      </div>
      <div class="field">
        <label>종료일</label>
        <input type="date" id="f_end">
      </div>
    </div>
    <div class="field">
      <label>시공 항목</label>
      <div class="tag-presets" id="tagPresets"></div>
      <div class="chosen-tags" id="chosenTags"></div>
      <input type="text" id="f_customTag" placeholder="직접 입력 후 Enter">
    </div>
    <div class="field">
      <label>담당 색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="field">
      <label>고객연락처 <span style="font-weight:400;color:#bbb;">(선택)</span></label>
      <input type="text" id="f_customer" placeholder="예) 010-1234-5678">
    </div>
    <div class="field">
      <label>협력업체 <span style="font-weight:400;color:#bbb;">(선택)</span></label>
      <div class="vendor-chip-list" id="vendorChipList"></div>
      <div class="vendor-add-box" id="vendorAddBox">
        <div class="addnew" id="vendorAddToggle" style="border:none;padding:4px;">+ 협력업체 추가</div>
        <div id="vendorAddForm" style="display:none;">
          <input type="text" id="f_vendorSearch" placeholder="이름으로 검색 또는 새로 입력">
          <div class="vendor-search-results" id="vendorSearchResults"></div>
          <div class="inline-row">
            <input type="text" id="f_vendorNewPhone" placeholder="새 번호 (예: 010-1234-5678)">
            <button class="btn btn-primary btn-sm" id="vendorAddConfirm">추가</button>
          </div>
          <div class="hint">저장된 협력업체는 다음 현장에서도 검색해서 바로 쓸 수 있어요.</div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>메모</label>
      <textarea id="f_memo" placeholder="특이사항, 계약금, 입고일 등"></textarea>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger" id="deleteBtn" style="display:none">삭제</button></div>
      <div class="right">
        <button class="btn btn-plain" onclick="closeModal('siteOverlay')">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- Weekly route modal -->
<div class="overlay" id="routeOverlay">
  <div class="modal">
    <h2>이번 주 현장 동선</h2>
    <div id="routeBody"></div>
    <div class="modal-actions">
      <div></div>
      <div class="right"><button class="btn btn-plain" onclick="closeModal('routeOverlay')">닫기</button></div>
    </div>
  </div>
</div>

<script>
const SITES_KEY = "interior_schedule_sites_v1";
const VENDORS_KEY = "interior_schedule_vendors_v1";
const TAG_PRESETS = ["철거","목공","전기","배관","타일","도배","장판","필름","실링팬"];
const COLORS = ["#4c6ef5","#f0506e","#2bb673","#f0a73b","#9b59b6","#16a3a3","#e36ec0"];

let sites = JSON.parse(localStorage.getItem(SITES_KEY) || "[]");
let vendorDirectory = JSON.parse(localStorage.getItem(VENDORS_KEY) || "[]");
let viewDate = new Date();
let editingId = null;
let chosenTags = [];
let chosenColor = COLORS[0];
let chosenVendors = []; // [{name, phone}]

function saveSites(){ localStorage.setItem(SITES_KEY, JSON.stringify(sites)); }
function saveVendors(){ localStorage.setItem(VENDORS_KEY, JSON.stringify(vendorDirectory)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function parse(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function escapeHtml(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }
function extractPhones(text){
  if(!text) return [];
  const matches = text.match(/01[0-9][-.\s]?\d{3,4}[-.\s]?\d{4}/g) || [];
  return [...new Set(matches.map(m=>m.replace(/[^0-9]/g,"")))];
}

function sitesForDate(dateStr){
  const d = parse(dateStr);
  return sites.filter(s=>{
    const start = parse(s.start), end = parse(s.end||s.start);
    return d>=start && d<=end;
  }).sort((a,b)=>a.start.localeCompare(b.start));
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById("monthLabel").textContent = `${y}년 ${m+1}월`;

  const dows = ["일","월","화","수","목","금","토"];
  dows.forEach((d,i)=>{
    const el = document.createElement("div");
    el.className = "dow"+(i===0?" sun":i===6?" sat":"");
    el.textContent = d;
    cal.appendChild(el);
  });

  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay();
  const gridStart = new Date(y,m,1-startOffset);
  const today = fmt(new Date());

  for(let i=0;i<42;i++){
    const cellDate = new Date(gridStart);
    cellDate.setDate(gridStart.getDate()+i);
    const dateStr = fmt(cellDate);
    const isOther = cellDate.getMonth()!==m;

    const day = document.createElement("div");
    day.className = "day"+(isOther?" other":"");
    day.onclick = ()=>openDayList(dateStr);

    const num = document.createElement("div");
    num.className = "daynum"+(dateStr===today?" today":"");
    num.textContent = cellDate.getDate();
    day.appendChild(num);

    const daySites = sitesForDate(dateStr);
    daySites.slice(0,3).forEach(s=>{
      const card = document.createElement("div");
      card.className = "site-card";
      card.style.background = s.color;
      card.innerHTML = `<div class="nm">${escapeHtml(s.name)}</div><div class="tags">${s.tags.join(" · ")}</div>`;
      card.onclick = (e)=>{ e.stopPropagation(); openSiteDetail(s.id); };
      day.appendChild(card);
    });
    if(daySites.length>3){
      const more = document.createElement("div");
      more.className = "more";
      more.textContent = `+${daySites.length-3}개 더`;
      day.appendChild(more);
    }
    cal.appendChild(day);
  }
}

function openDayList(dateStr){
  const list = sitesForDate(dateStr);
  document.getElementById("dayListTitle").textContent = dateStr + " 현장 목록";
  const body = document.getElementById("dayListBody");
  body.innerHTML = "";
  if(list.length===0){
    body.innerHTML = `<p class="empty-state">등록된 현장이 없습니다.</p>`;
  }
  list.forEach(s=>{
    const row = document.createElement("div");
    row.className = "site-row";
    row.innerHTML = `<div class="dot" style="background:${s.color}"></div>
      <div class="info">
        <div class="nm">${escapeHtml(s.name)}</div>
        <div class="ad">${escapeHtml(s.addr||"주소 미입력")}</div>
        <div class="tg">${s.tags.join(" · ")}</div>
      </div>`;
    row.onclick = ()=>openSiteDetail(s.id);
    body.appendChild(row);
  });
  document.getElementById("addnewBtn").onclick = ()=>{ closeModal("dayListOverlay"); openSiteModal(null, dateStr); };
  openModal("dayListOverlay");
}

function openSiteDetail(id){
  const s = sites.find(x=>x.id===id);
  if(!s) return;
  editingId = id;

  document.getElementById("d_dot").style.background = s.color;
  document.getElementById("d_name").textContent = s.name;
  document.getElementById("d_addr").textContent = s.addr || "-";
  document.getElementById("d_addr").className = "value"+(s.addr?"":" empty");
  document.getElementById("d_addrLink").href = "https://map.naver.com/p/search/"+encodeURIComponent(s.addr||s.name);
  document.getElementById("d_period").textContent = s.start===s.end ? s.start : `${s.start} ~ ${s.end}`;

  const tagsWrap = document.getElementById("d_tags");
  tagsWrap.innerHTML = s.tags.length ? s.tags.map(t=>`<span>${escapeHtml(t)}</span>`).join("") : `<span style="color:#ccc;background:none;padding:0;">미입력</span>`;

  const custWrap = document.getElementById("d_customer");
  custWrap.innerHTML = "";
  if(!s.customer){
    custWrap.innerHTML = `<div class="value empty">-</div>`;
  } else {
    const phones = extractPhones(s.customer);
    const head = document.createElement("div");
    head.className = "value";
    head.textContent = s.customer;
    custWrap.appendChild(head);
    phones.forEach(p=>{
      const row = document.createElement("div");
      row.className = "phone-actions";
      row.style.marginTop = "6px";
      row.innerHTML = `<span class="num">${p}</span><a class="call" href="tel:${p}">📞 전화</a><a class="sms" href="sms:${p}">💬 문자</a>`;
      custWrap.appendChild(row);
    });
  }

  const vendWrap = document.getElementById("d_vendors");
  vendWrap.innerHTML = "";
  const vlist = s.vendors || [];
  if(vlist.length===0){
    vendWrap.innerHTML = `<div class="value empty">-</div>`;
  } else {
    vlist.forEach(v=>{
      const block = document.createElement("div");
      block.className = "vendor-block";
      const phones = extractPhones(v.phone);
      block.innerHTML = `<div class="vname">${escapeHtml(v.name)}</div>` +
        (phones.length ? `<div class="phone-actions"><span class="num">${phones[0]}</span><a class="call" href="tel:${phones[0]}">📞 전화</a><a class="sms" href="sms:${phones[0]}">💬 문자</a></div>` : `<div class="value empty" style="font-size:12px;">번호 미입력</div>`);
      vendWrap.appendChild(block);
    });
  }

  const memo = document.getElementById("d_memo");
  memo.textContent = s.memo || "-";
  memo.className = "value"+(s.memo?"":" empty");

  document.getElementById("d_editBtn").onclick = ()=>{ closeModal("siteDetailOverlay"); openSiteModal(s.id); };
  document.getElementById("d_deleteBtn").onclick = ()=>{
    if(!confirm("이 현장을 삭제할까요?")) return;
    sites = sites.filter(x=>x.id!==s.id);
    saveSites();
    closeModal("siteDetailOverlay");
    renderCalendar();
  };

  openModal("siteDetailOverlay");
}

function buildTagPresets(){
  const wrap = document.getElementById("tagPresets");
  wrap.innerHTML = "";
  TAG_PRESETS.forEach(t=>{
    const el = document.createElement("span");
    el.textContent = t;
    el.className = chosenTags.includes(t) ? "active" : "";
    el.onclick = ()=> { addTag(t); buildTagPresets(); };
    wrap.appendChild(el);
  });
}
function renderChosenTags(){
  const wrap = document.getElementById("chosenTags");
  wrap.innerHTML = "";
  chosenTags.forEach(t=>{
    const el = document.createElement("span");
    el.textContent = t + " ✕";
    el.onclick = ()=>{ chosenTags = chosenTags.filter(x=>x!==t); renderChosenTags(); buildTagPresets(); };
    wrap.appendChild(el);
  });
}
function addTag(t){
  t = t.trim();
  if(!t || chosenTags.includes(t)) return;
  chosenTags.push(t);
  renderChosenTags();
}
function buildColorRow(){
  const wrap = document.getElementById("colorRow");
  wrap.innerHTML = "";
  COLORS.forEach(c=>{
    const dot = document.createElement("div");
    dot.className = "color-dot"+(c===chosenColor?" active":"");
    dot.style.background = c;
    dot.onclick = ()=>{ chosenColor=c; buildColorRow(); };
    wrap.appendChild(dot);
  });
}

/* ---- Vendor picker in form ---- */
function renderVendorChips(){
  const wrap = document.getElementById("vendorChipList");
  wrap.innerHTML = "";
  chosenVendors.forEach((v,idx)=>{
    const chip = document.createElement("div");
    chip.className = "vendor-chip";
    chip.innerHTML = `<div class="vinfo"><b>${escapeHtml(v.name)}</b><span>${escapeHtml(v.phone||"번호 없음")}</span></div>`;
    const rm = document.createElement("button");
    rm.textContent = "삭제";
    rm.onclick = ()=>{ chosenVendors.splice(idx,1); renderVendorChips(); };
    chip.appendChild(rm);
    wrap.appendChild(chip);
  });
}
function closeVendorAddForm(){
  document.getElementById("vendorAddForm").style.display = "none";
  document.getElementById("vendorAddBox").classList.remove("open");
  document.getElementById("f_vendorSearch").value = "";
  document.getElementById("f_vendorNewPhone").value = "";
  document.getElementById("vendorSearchResults").innerHTML = "";
}
function renderVendorSearch(){
  const q = document.getElementById("f_vendorSearch").value.trim();
  const results = document.getElementById("vendorSearchResults");
  results.innerHTML = "";
  if(!q) return;
  const matches = vendorDirectory.filter(v=>v.name.includes(q));
  matches.forEach(v=>{
    const opt = document.createElement("div");
    opt.className = "opt";
    opt.innerHTML = `<b>${escapeHtml(v.name)}</b><span>${escapeHtml(v.phone||"")}</span>`;
    opt.onclick = ()=>{
      if(!chosenVendors.find(cv=>cv.name===v.name && cv.phone===v.phone)){
        chosenVendors.push({name:v.name, phone:v.phone});
        renderVendorChips();
      }
      closeVendorAddForm();
    };
    results.appendChild(opt);
  });
}

document.getElementById("vendorAddToggle").onclick = ()=>{
  document.getElementById("vendorAddForm").style.display = "block";
  document.getElementById("vendorAddBox").classList.add("open");
  document.getElementById("f_vendorSearch").focus();
};
document.getElementById("f_vendorSearch").addEventListener("input", renderVendorSearch);
document.getElementById("vendorAddConfirm").onclick = ()=>{
  const name = document.getElementById("f_vendorSearch").value.trim();
  const phone = document.getElementById("f_vendorNewPhone").value.trim();
  if(!name){ alert("협력업체 이름을 입력해주세요."); return; }
  chosenVendors.push({name, phone});
  if(!vendorDirectory.find(v=>v.name===name)){
    vendorDirectory.push({id:uid(), name, phone});
    saveVendors();
  } else if(phone){
    vendorDirectory = vendorDirectory.map(v=> v.name===name && !v.phone ? {...v, phone} : v);
    saveVendors();
  }
  renderVendorChips();
  closeVendorAddForm();
};

function openSiteModal(id, defaultDate){
  editingId = id;
  const site = id ? sites.find(s=>s.id===id) : null;

  document.getElementById("siteModalTitle").textContent = site ? "현장 수정" : "현장 등록";
  document.getElementById("f_name").value = site?.name || "";
  document.getElementById("f_addr").value = site?.addr || "";
  document.getElementById("f_start").value = site?.start || defaultDate || fmt(new Date());
  document.getElementById("f_end").value = site?.end || defaultDate || fmt(new Date());
  document.getElementById("f_customer").value = site?.customer || "";
  document.getElementById("f_memo").value = site?.memo || "";
  chosenTags = site ? [...site.tags] : [];
  chosenColor = site?.color || COLORS[(sites.length)%COLORS.length];
  chosenVendors = site?.vendors ? site.vendors.map(v=>({...v})) : [];
  buildTagPresets();
  renderChosenTags();
  buildColorRow();
  renderVendorChips();
  closeVendorAddForm();
  updateAddrLink();

  document.getElementById("deleteBtn").style.display = site ? "inline-block" : "none";
  openModal("siteOverlay");
}

function updateAddrLink(){
  const addr = document.getElementById("f_addr").value;
  const link = document.getElementById("f_addrLink");
  link.href = "https://map.naver.com/p/search/" + encodeURIComponent(addr || "");
}

document.getElementById("f_addr").addEventListener("input", updateAddrLink);
document.getElementById("f_customTag").addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); addTag(e.target.value); e.target.value=""; buildTagPresets(); }
});

document.getElementById("saveBtn").onclick = ()=>{
  const name = document.getElementById("f_name").value.trim();
  if(!name){ alert("현장명을 입력해주세요."); return; }
  const data = {
    id: editingId || uid(),
    name,
    addr: document.getElementById("f_addr").value.trim(),
    start: document.getElementById("f_start").value,
    end: document.getElementById("f_end").value || document.getElementById("f_start").value,
    tags: chosenTags,
    color: chosenColor,
    customer: document.getElementById("f_customer").value.trim(),
    vendors: chosenVendors,
    memo: document.getElementById("f_memo").value.trim()
  };
  if(editingId){
    sites = sites.map(s=>s.id===editingId?data:s);
  } else {
    sites.push(data);
  }
  saveSites();
  closeModal("siteOverlay");
  renderCalendar();
};

document.getElementById("deleteBtn").onclick = ()=>{
  if(!confirm("이 현장을 삭제할까요?")) return;
  sites = sites.filter(s=>s.id!==editingId);
  saveSites();
  closeModal("siteOverlay");
  renderCalendar();
};

function openModal(id){ document.getElementById(id).classList.add("show"); }
function closeModal(id){ document.getElementById(id).classList.remove("show"); }

document.getElementById("prevBtn").onclick = ()=>{ viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); };
document.getElementById("nextBtn").onclick = ()=>{ viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); };
document.getElementById("todayBtn").onclick = ()=>{ viewDate = new Date(); renderCalendar(); };
document.getElementById("newSiteBtn").onclick = ()=> openSiteModal(null, fmt(new Date()));

document.getElementById("addrBookBtn").onclick = ()=>{
  const today = new Date();
  const day0 = new Date(today); day0.setDate(today.getDate()-today.getDay());
  const week = [];
  for(let i=0;i<7;i++){ const d=new Date(day0); d.setDate(day0.getDate()+i); week.push(fmt(d)); }
  const body = document.getElementById("routeBody");
  body.innerHTML = "";
  week.forEach(dateStr=>{
    const list = sitesForDate(dateStr);
    const block = document.createElement("div");
    block.style.marginBottom = "12px";
    block.innerHTML = `<div style="font-size:12px;color:var(--sub);font-weight:700;margin-bottom:6px;">${dateStr}</div>`;
    if(list.length===0){
      block.innerHTML += `<div style="font-size:12px;color:#ccc;">-</div>`;
    } else {
      list.forEach(s=>{
        const row = document.createElement("div");
        row.className = "site-row";
        row.style.marginBottom = "4px";
        row.innerHTML = `<div class="dot" style="background:${s.color}"></div>
          <div class="info"><div class="nm">${escapeHtml(s.name)}</div><div class="ad">${escapeHtml(s.addr||"")}</div></div>`;
        row.onclick = ()=>{ closeModal("routeOverlay"); openSiteDetail(s.id); };
        block.appendChild(row);
      });
    }
    body.appendChild(block);
  });
  openModal("routeOverlay");
};

/* ---- Export / Import backup ---- */
document.getElementById("exportBtn").onclick = ()=>{
  const payload = { sites, vendors: vendorDirectory, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `현장스케줄_백업_${fmt(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById("importBtn").onclick = ()=> document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data.sites)) throw new Error("형식 오류");
      const mode = confirm("기존 데이터에 추가하려면 [확인], 기존 데이터를 모두 교체하려면 [취소]를 누르세요.") ? "merge" : "replace";
      if(mode==="replace"){
        sites = data.sites;
        vendorDirectory = data.vendors || [];
      } else {
        const existingIds = new Set(sites.map(s=>s.id));
        data.sites.forEach(s=>{ if(!existingIds.has(s.id)) sites.push(s); });
        (data.vendors||[]).forEach(v=>{ if(!vendorDirectory.find(x=>x.name===v.name)) vendorDirectory.push(v); });
      }
      saveSites(); saveVendors();
      renderCalendar();
      alert("가져오기가 완료되었습니다.");
    }catch(err){
      alert("파일을 읽을 수 없습니다. 올바른 백업 파일인지 확인해주세요.");
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

[document.getElementById("dayListOverlay"),document.getElementById("siteOverlay"),document.getElementById("siteDetailOverlay"),document.getElementById("routeOverlay")].forEach(ov=>{
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.classList.remove("show"); });
});

renderCalendar();
</script>
