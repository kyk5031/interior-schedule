<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 스케줄러</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --border:#e3e5e9; --text:#222; --sub:#888;
    --accent:#3b6ef0; --danger:#e35353;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
  header h1{font-size:18px;margin:0;}
  .nav{display:flex;align-items:center;gap:10px;}
  .nav button{border:none;background:var(--bg);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;}
  .nav button:hover{background:#e9ebee;}
  #monthLabel{font-weight:700;font-size:16px;min-width:90px;text-align:center;}
  .toolbar{display:flex;gap:8px;}
  .toolbar button{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
  .toolbar button.secondary{background:#fff;color:var(--accent);border:1px solid var(--accent);}

  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin:14px 20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .dow{background:#fafafa;text-align:center;padding:8px 0;font-size:12px;color:var(--sub);font-weight:600;}
  .dow.sun{color:#e35353;} .dow.sat{color:#3b6ef0;}
  .day{background:var(--card);min-height:120px;padding:6px;display:flex;flex-direction:column;gap:4px;cursor:pointer;position:relative;}
  .day.other{background:#fafafa;opacity:.45;}
  .day:hover{background:#f7f9ff;}
  .daynum{font-size:12px;color:var(--sub);font-weight:600;align-self:flex-start;}
  .daynum.today{background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
  .site-card{font-size:11px;border-radius:6px;padding:3px 6px;color:#fff;line-height:1.35;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .site-card .nm{font-weight:700;}
  .site-card .tags{opacity:.9;}
  .more{font-size:10px;color:var(--sub);padding-left:4px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;width:420px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:20px;}
  .modal h2{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;}
  .field input,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .field textarea{resize:vertical;min-height:50px;}
  .row{display:flex;gap:8px;}
  .row .field{flex:1;}
  .tag-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .tag-presets span{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .tag-presets span:hover{background:#e9ebee;}
  .chosen-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:20px;}
  .chosen-tags span{background:var(--accent);color:#fff;border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer;}
  .color-row{display:flex;gap:8px;margin-bottom:10px;}
  .color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .color-dot.active{border-color:#222;}
  .addr-link{font-size:12px;color:var(--accent);text-decoration:none;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:16px;}
  .modal-actions .right{display:flex;gap:8px;}
  .btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-plain{background:var(--bg);color:var(--text);}

  .day-list-modal .site-row{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;}
  .day-list-modal .site-row .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .day-list-modal .site-row .info{flex:1;min-width:0;}
  .day-list-modal .site-row .info .nm{font-weight:700;font-size:13px;}
  .day-list-modal .site-row .info .ad{font-size:11px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .day-list-modal .site-row .info .tg{font-size:11px;color:var(--accent);}
  .addnew{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;border:1px dashed var(--border);border-radius:8px;color:var(--sub);cursor:pointer;font-size:13px;}
  .addnew:hover{background:var(--bg);}

  /* Detail view */
  .detail-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .detail-head .dot{width:12px;height:12px;border-radius:50%;flex:none;}
  .detail-head h2{margin:0;font-size:17px;}
  .detail-row{margin-bottom:14px;}
  .detail-row .label{font-size:11px;color:var(--sub);margin-bottom:3px;}
  .detail-row .value{font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .detail-row .value.empty{color:#ccc;}
  .detail-tags span{display:inline-block;background:var(--bg);border-radius:14px;padding:4px 10px;font-size:12px;margin:0 6px 6px 0;}
  .phone-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .phone-actions .num{font-size:14px;font-weight:600;}
  .phone-actions a{font-size:12px;text-decoration:none;border:1px solid var(--border);border-radius:14px;padding:4px 10px;color:var(--text);}
  .phone-actions a.call{color:#fff;background:var(--accent);border-color:var(--accent);}
  .phone-actions a.sms{color:var(--accent);}
</style>
</head>
<body>

<header>
  <h1>🏗 현장 스케줄러</h1>
  <div class="nav">
    <button id="prevBtn">‹</button>
    <div id="monthLabel"></div>
    <button id="nextBtn">›</button>
    <button id="todayBtn">오늘</button>
  </div>
  <div class="toolbar">
    <button class="secondary" id="addrBookBtn">📍 이번주 동선</button>
    <button id="newSiteBtn">+ 새 현장</button>
  </div>
</header>

<div class="calendar" id="calendar"></div>

<!-- Day list modal (when a day has cards, clicking day shows list) -->
<div class="overlay" id="dayListOverlay">
  <div class="modal day-list-modal">
    <h2 id="dayListTitle"></h2>
    <div id="dayListBody"></div>
    <div class="addnew" id="addnewBtn">+ 이 날짜에 현장 추가</div>
    <div class="modal-actions">
      <div></div>
      <div class="right"><button class="btn btn-plain" onclick="closeModal('dayListOverlay')">닫기</button></div>
    </div>
  </div>
</div>

<!-- Site detail (read-only) modal -->
<div class="overlay" id="siteDetailOverlay">
  <div class="modal">
    <div class="detail-head">
      <div class="dot" id="d_dot"></div>
      <h2 id="d_name"></h2>
    </div>
    <div class="detail-row">
      <div class="label">주소</div>
      <div class="value" id="d_addr"></div>
      <a href="#" target="_blank" class="addr-link" id="d_addrLink">🗺 지도에서 보기</a>
    </div>
    <div class="detail-row">
      <div class="label">기간</div>
      <div class="value" id="d_period"></div>
    </div>
    <div class="detail-row">
      <div class="label">시공 항목</div>
      <div class="detail-tags" id="d_tags"></div>
    </div>
    <div class="detail-row">
      <div class="label">협력업체 / 연락처</div>
      <div id="d_vendor"></div>
    </div>
    <div class="detail-row">
      <div class="label">메모</div>
      <div class="value" id="d_memo"></div>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger" id="d_deleteBtn">삭제</button></div>
      <div class="right">
        <button class="btn btn-plain" onclick="closeModal('siteDetailOverlay')">닫기</button>
        <button class="btn btn-primary" id="d_editBtn">수정</button>
      </div>
    </div>
  </div>
</div>

<!-- Site edit modal -->
<div class="overlay" id="siteOverlay">
  <div class="modal">
    <h2 id="siteModalTitle">현장 등록</h2>
    <div class="field">
      <label>현장명 / 고객명</label>
      <input type="text" id="f_name" placeholder="예) 김포 한빛마을 105동 1103호">
    </div>
    <div class="field">
      <label>주소</label>
      <input type="text" id="f_addr" placeholder="예) 경기 김포시 ...">
      <a href="#" target="_blank" class="addr-link" id="f_addrLink">🗺 지도에서 보기</a>
    </div>
    <div class="row">
      <div class="field">
        <label>시작일</label>
        <input type="date" id="f_start">
      </div>
      <div class="field">
        <label>종료일</label>
        <input type="date" id="f_end">
      </div>
    </div>
    <div class="field">
      <label>시공 항목</label>
      <div class="tag-presets" id="tagPresets"></div>
      <div class="chosen-tags" id="chosenTags"></div>
      <input type="text" id="f_customTag" placeholder="직접 입력 후 Enter">
    </div>
    <div class="field">
      <label>담당 색상</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="field">
      <label>협력업체 / 연락처</label>
      <input type="text" id="f_vendor" placeholder="예) 도배라움 010-1234-5678">
    </div>
    <div class="field">
      <label>메모</label>
      <textarea id="f_memo" placeholder="특이사항, 계약금, 입고일 등"></textarea>
    </div>
    <div class="modal-actions">
      <div><button class="btn btn-danger" id="deleteBtn" style="display:none">삭제</button></div>
      <div class="right">
        <button class="btn btn-plain" onclick="closeModal('siteOverlay')">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- Weekly route modal -->
<div class="overlay" id="routeOverlay">
  <div class="modal">
    <h2>이번 주 현장 동선</h2>
    <div id="routeBody"></div>
    <div class="modal-actions">
      <div></div>
      <div class="right"><button class="btn btn-plain" onclick="closeModal('routeOverlay')">닫기</button></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "interior_schedule_sites_v1";
const TAG_PRESETS = ["철거","목공","전기","배관","타일","도배","장판","필름","실링팬"];
const COLORS = ["#3b6ef0","#e35353","#2bb673","#f0a73b","#9b59b6","#16a3a3","#e36ec0"];

let sites = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let viewDate = new Date();
let editingId = null;
let chosenTags = [];
let chosenColor = COLORS[0];
let modalContextDate = null;

function saveSites(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function parse(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }

function sitesForDate(dateStr){
  const d = parse(dateStr);
  return sites.filter(s=>{
    const start = parse(s.start), end = parse(s.end||s.start);
    return d>=start && d<=end;
  }).sort((a,b)=>a.start.localeCompare(b.start));
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  document.getElementById("monthLabel").textContent = `${y}년 ${m+1}월`;

  const dows = ["일","월","화","수","목","금","토"];
  dows.forEach((d,i)=>{
    const el = document.createElement("div");
    el.className = "dow"+(i===0?" sun":i===6?" sat":"");
    el.textContent = d;
    cal.appendChild(el);
  });

  const firstDay = new Date(y,m,1);
  const startOffset = firstDay.getDay();
  const gridStart = new Date(y,m,1-startOffset);
  const today = fmt(new Date());

  for(let i=0;i<42;i++){
    const cellDate = new Date(gridStart);
    cellDate.setDate(gridStart.getDate()+i);
    const dateStr = fmt(cellDate);
    const isOther = cellDate.getMonth()!==m;

    const day = document.createElement("div");
    day.className = "day"+(isOther?" other":"");
    day.onclick = ()=>openDayList(dateStr);

    const num = document.createElement("div");
    num.className = "daynum"+(dateStr===today?" today":"");
    num.textContent = cellDate.getDate();
    day.appendChild(num);

    const daySites = sitesForDate(dateStr);
    daySites.slice(0,3).forEach(s=>{
      const card = document.createElement("div");
      card.className = "site-card";
      card.style.background = s.color;
      card.innerHTML = `<div class="nm">${escapeHtml(s.name)}</div><div class="tags">${s.tags.join(" · ")}</div>`;
      card.onclick = (e)=>{ e.stopPropagation(); openSiteDetail(s.id); };
      day.appendChild(card);
    });
    if(daySites.length>3){
      const more = document.createElement("div");
      more.className = "more";
      more.textContent = `+${daySites.length-3}개 더`;
      day.appendChild(more);
    }
    cal.appendChild(day);
  }
}

function escapeHtml(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

function openDayList(dateStr){
  modalContextDate = dateStr;
  const list = sitesForDate(dateStr);
  document.getElementById("dayListTitle").textContent = dateStr + " 현장 목록";
  const body = document.getElementById("dayListBody");
  body.innerHTML = "";
  if(list.length===0){
    body.innerHTML = `<p style="color:#888;font-size:13px;">등록된 현장이 없습니다.</p>`;
  }
  list.forEach(s=>{
    const row = document.createElement("div");
    row.className = "site-row";
    row.innerHTML = `<div class="dot" style="background:${s.color}"></div>
      <div class="info">
        <div class="nm">${escapeHtml(s.name)}</div>
        <div class="ad">${escapeHtml(s.addr||"주소 미입력")}</div>
        <div class="tg">${s.tags.join(" · ")}</div>
      </div>`;
    row.onclick = ()=>openSiteDetail(s.id);
    body.appendChild(row);
  });
  document.getElementById("addnewBtn").onclick = ()=>{ closeModal("dayListOverlay"); openSiteModal(null, dateStr); };
  openModal("dayListOverlay");
}

function extractPhones(text){
  if(!text) return [];
  const matches = text.match(/01[0-9][-.\s]?\d{3,4}[-.\s]?\d{4}/g) || [];
  return [...new Set(matches.map(m=>m.replace(/[^0-9]/g,"")))];
}

function openSiteDetail(id){
  const s = sites.find(x=>x.id===id);
  if(!s) return;
  editingId = id;

  document.getElementById("d_dot").style.background = s.color;
  document.getElementById("d_name").textContent = s.name;
  document.getElementById("d_addr").textContent = s.addr || "-";
  document.getElementById("d_addr").className = "value"+(s.addr?"":" empty");
  document.getElementById("d_addrLink").href = "https://map.naver.com/p/search/"+encodeURIComponent(s.addr||s.name);
  document.getElementById("d_period").textContent = s.start===s.end ? s.start : `${s.start} ~ ${s.end}`;

  const tagsWrap = document.getElementById("d_tags");
  tagsWrap.innerHTML = s.tags.length ? s.tags.map(t=>`<span>${escapeHtml(t)}</span>`).join("") : `<span style="color:#ccc;background:none;padding:0;">미입력</span>`;

  const vendorWrap = document.getElementById("d_vendor");
  vendorWrap.innerHTML = "";
  if(!s.vendor){
    vendorWrap.innerHTML = `<div class="value empty">-</div>`;
  } else {
    const phones = extractPhones(s.vendor);
    const head = document.createElement("div");
    head.className = "value";
    head.textContent = s.vendor;
    vendorWrap.appendChild(head);
    phones.forEach(p=>{
      const row = document.createElement("div");
      row.className = "phone-actions";
      row.style.marginTop = "6px";
      row.innerHTML = `<span class="num">${p}</span>
        <a class="call" href="tel:${p}">📞 전화</a>
        <a class="sms" href="sms:${p}">💬 문자</a>`;
      vendorWrap.appendChild(row);
    });
  }

  const memo = document.getElementById("d_memo");
  memo.textContent = s.memo || "-";
  memo.className = "value"+(s.memo?"":" empty");

  document.getElementById("d_editBtn").onclick = ()=>{ closeModal("siteDetailOverlay"); openSiteModal(s.id); };
  document.getElementById("d_deleteBtn").onclick = ()=>{
    if(!confirm("이 현장을 삭제할까요?")) return;
    sites = sites.filter(x=>x.id!==s.id);
    saveSites();
    closeModal("siteDetailOverlay");
    renderCalendar();
  };

  openModal("siteDetailOverlay");
}

function buildTagPresets(){
  const wrap = document.getElementById("tagPresets");
  wrap.innerHTML = "";
  TAG_PRESETS.forEach(t=>{
    const el = document.createElement("span");
    el.textContent = t;
    el.onclick = ()=> addTag(t);
    wrap.appendChild(el);
  });
}
function renderChosenTags(){
  const wrap = document.getElementById("chosenTags");
  wrap.innerHTML = "";
  chosenTags.forEach(t=>{
    const el = document.createElement("span");
    el.textContent = t + " ✕";
    el.onclick = ()=>{ chosenTags = chosenTags.filter(x=>x!==t); renderChosenTags(); };
    wrap.appendChild(el);
  });
}
function addTag(t){
  t = t.trim();
  if(!t || chosenTags.includes(t)) return;
  chosenTags.push(t);
  renderChosenTags();
}
function buildColorRow(){
  const wrap = document.getElementById("colorRow");
  wrap.innerHTML = "";
  COLORS.forEach(c=>{
    const dot = document.createElement("div");
    dot.className = "color-dot"+(c===chosenColor?" active":"");
    dot.style.background = c;
    dot.onclick = ()=>{ chosenColor=c; buildColorRow(); };
    wrap.appendChild(dot);
  });
}

function openSiteModal(id, defaultDate){
  editingId = id;
  buildTagPresets();
  const site = id ? sites.find(s=>s.id===id) : null;

  document.getElementById("siteModalTitle").textContent = site ? "현장 수정" : "현장 등록";
  document.getElementById("f_name").value = site?.name || "";
  document.getElementById("f_addr").value = site?.addr || "";
  document.getElementById("f_start").value = site?.start || defaultDate || fmt(new Date());
  document.getElementById("f_end").value = site?.end || defaultDate || fmt(new Date());
  document.getElementById("f_vendor").value = site?.vendor || "";
  document.getElementById("f_memo").value = site?.memo || "";
  chosenTags = site ? [...site.tags] : [];
  chosenColor = site?.color || COLORS[(sites.length)%COLORS.length];
  renderChosenTags();
  buildColorRow();
  updateAddrLink();

  document.getElementById("deleteBtn").style.display = site ? "inline-block" : "none";
  openModal("siteOverlay");
}

function updateAddrLink(){
  const addr = document.getElementById("f_addr").value;
  const link = document.getElementById("f_addrLink");
  link.href = "https://map.naver.com/p/search/" + encodeURIComponent(addr || "");
}

document.getElementById("f_addr").addEventListener("input", updateAddrLink);
document.getElementById("f_customTag").addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); addTag(e.target.value); e.target.value=""; }
});

document.getElementById("saveBtn").onclick = ()=>{
  const name = document.getElementById("f_name").value.trim();
  if(!name){ alert("현장명을 입력해주세요."); return; }
  const data = {
    id: editingId || uid(),
    name,
    addr: document.getElementById("f_addr").value.trim(),
    start: document.getElementById("f_start").value,
    end: document.getElementById("f_end").value || document.getElementById("f_start").value,
    tags: chosenTags,
    color: chosenColor,
    vendor: document.getElementById("f_vendor").value.trim(),
    memo: document.getElementById("f_memo").value.trim()
  };
  if(editingId){
    sites = sites.map(s=>s.id===editingId?data:s);
  } else {
    sites.push(data);
  }
  saveSites();
  closeModal("siteOverlay");
  renderCalendar();
};

document.getElementById("deleteBtn").onclick = ()=>{
  if(!confirm("이 현장을 삭제할까요?")) return;
  sites = sites.filter(s=>s.id!==editingId);
  saveSites();
  closeModal("siteOverlay");
  renderCalendar();
};

function openModal(id){ document.getElementById(id).classList.add("show"); }
function closeModal(id){ document.getElementById(id).classList.remove("show"); }

document.getElementById("prevBtn").onclick = ()=>{ viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); };
document.getElementById("nextBtn").onclick = ()=>{ viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); };
document.getElementById("todayBtn").onclick = ()=>{ viewDate = new Date(); renderCalendar(); };
document.getElementById("newSiteBtn").onclick = ()=> openSiteModal(null, fmt(new Date()));

document.getElementById("addrBookBtn").onclick = ()=>{
  const today = new Date();
  const day0 = new Date(today); day0.setDate(today.getDate()-today.getDay());
  const week = [];
  for(let i=0;i<7;i++){ const d=new Date(day0); d.setDate(day0.getDate()+i); week.push(fmt(d)); }
  const body = document.getElementById("routeBody");
  body.innerHTML = "";
  week.forEach(dateStr=>{
    const list = sitesForDate(dateStr);
    const block = document.createElement("div");
    block.style.marginBottom = "10px";
    block.innerHTML = `<div style="font-size:12px;color:#888;font-weight:700;margin-bottom:4px;">${dateStr}</div>`;
    if(list.length===0){
      block.innerHTML += `<div style="font-size:12px;color:#ccc;">-</div>`;
    } else {
      list.forEach(s=>{
        const row = document.createElement("div");
        row.className = "site-row";
        row.style.marginBottom = "4px";
        row.innerHTML = `<div class="dot" style="background:${s.color}"></div>
          <div class="info"><div class="nm">${escapeHtml(s.name)}</div><div class="ad">${escapeHtml(s.addr||"")}</div></div>`;
        row.onclick = ()=>{ closeModal("routeOverlay"); openSiteDetail(s.id); };
        block.appendChild(row);
      });
    }
    body.appendChild(block);
  });
  openModal("routeOverlay");
};

[document.getElementById("dayListOverlay"),document.getElementById("siteOverlay"),document.getElementById("siteDetailOverlay"),document.getElementById("routeOverlay")].forEach(ov=>{
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.classList.remove("show"); });
});

renderCalendar();
</script>
</body>
</html>
